name: Delete Job

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: Job id to delete
        required: true

permissions:
  contents: write

concurrency:
  group: delete-${{ github.repository }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate input
        env:
          JOB_ID: ${{ github.event.inputs.job_id }}
        run: |
          set -euo pipefail
          if [[ ! "${JOB_ID}" =~ ^[A-Za-z0-9_-]{6,64}$ ]]; then
            echo "job_id must match ^[A-Za-z0-9_-]{6,64}$"
            exit 1
          fi

      - name: Delete job folder
        env:
          JOB_ID: ${{ github.event.inputs.job_id }}
        run: |
          set -euo pipefail
          TARGET="jobs/${JOB_ID}"
          if [[ -d "${TARGET}" ]]; then
            git rm -r "${TARGET}"
            echo "Deleted ${TARGET}"
          else
            echo "Job folder not found: ${TARGET}"
          fi

      - name: Commit and push
        env:
          JOB_ID: ${{ github.event.inputs.job_id }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "job: delete ${JOB_ID}" || echo "No changes to commit"
          git push
